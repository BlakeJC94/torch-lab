[tool.poetry]
name = "torch-lab"
version = "0.1.0"
description = ""
authors = ["BlakeJC94 <blakejamescook@gmail.com>"]
readme = "README.md"
packages = [{include = "torch_lab"}]

[tool.poetry.dependencies]
python = ">=3.9,<3.13"
torch = "^2.0.1"
pytorch-lightning = "^2.0.4"
pandas = "^2.0.2"
numpy = "^1.25.0"
scipy = "^1.11.0"
torchmetrics = "^0.11.4"
tqdm = "^4.65.0"
fire = "^0.5.0"
humanize = "^4.6.0"
plotly = "^5.15.0"
matplotlib = "^3.7.1"
clearml = "^1.11.1"
tensorboard = "^2.13.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
ipython = "^8.14.0"
black = "^23.3.0"
ipdb = "^0.13.13"
ruff = "^0.0.275"

# [tool.poetry.group.cpu.dependencies]
# torch = {version = "^2.0.1+cpu", source = "torch-cpu"}


[tool.poetry.group.examples.dependencies]
mnist = "^0.2.2"

[tool.poetry.scripts]
lab = 'torch_lab.__main__:main'

[[tool.poetry.source]]
name = "torch-cpu"
url = "https://download.pytorch.org/whl/cpu"
# priority = 'explicit'

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
